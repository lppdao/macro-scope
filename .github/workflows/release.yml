name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            rust-target: x86_64-unknown-linux-musl
            extra-build-args: --no-zigbuild
          - os: windows-latest
            target: win32-x64
            rust-target: x86_64-pc-windows-msvc
            extra-build-args: ''
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust-target }}-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust-target }}-

      - name: Install musl-tools (Linux only)
        if: matrix.target == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install npm dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run Rust tests
        run: npm run test-server

      - name: Build server binary
        run: node scripts/build-server.mjs --target ${{ matrix.target }} ${{ matrix.extra-build-args }}

      - name: Verify Linux binary is statically linked
        if: matrix.target == 'linux-x64'
        run: |
          file server/bin/linux-x64/macro-scope-server
          if ldd server/bin/linux-x64/macro-scope-server 2>&1 | grep -qv 'not a dynamic executable'; then
            echo "ERROR: binary is not statically linked"
            ldd server/bin/linux-x64/macro-scope-server
            exit 1
          fi
          echo "Statically linked: OK"

      - name: Package platform-specific VSIX
        if: github.event_name != 'pull_request'
        run: npx --no-install vsce package --target ${{ matrix.target }} --out macro-scope-${{ matrix.target }}.vsix

      - name: Upload VSIX artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: macro-scope-${{ matrix.target }}
          path: macro-scope-${{ matrix.target }}.vsix
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release with VSIX files
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.vsix
          fail_on_unmatched_files: true
          generate_release_notes: true
